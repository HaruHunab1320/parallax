# Coding Swarm Org Pattern
#
# Distributed multi-agent coding demo with thread-backed CLI agents.
# One architect (Mac) plans and reviews, three engineers (Raspberry Pis)
# implement in parallel using Claude Code, Codex, and Gemini CLI.
#
# Hardware mapping:
#   Echo  (Mac)  → architect  → Claude Code
#   Vero  (Pi)   → engineer_a → Claude Code
#   Sable (Pi)   → engineer_b → Codex
#   Silas (Pi)   → engineer_c → Gemini CLI

name: coding-swarm
version: "1.0.0"
description: |
  Thread-backed distributed coding swarm. An architect agent decomposes a
  project into subtasks, three engineer agents implement in parallel on
  Raspberry Pis, and the architect reviews and merges the results.

structure:
  name: Coding Swarm
  description: Architect + 3 distributed engineer agents on heterogeneous hardware

  roles:
    architect:
      id: architect
      name: Architect
      description: Decomposes the project into subtasks, assigns work, and reviews results
      agentType: claude
      singleton: true
      capabilities:
        - system_design
        - architecture
        - code_review
        - task_decomposition
      expertise:
        - architecture
        - design
        - project_planning
      threadConfig:
        enabled: true
        objective: |
          You are the architect for this project. Analyze the task, create an
          implementation plan with 3 subtasks (one per engineer), and produce a
          structured JSON plan. Each subtask should be independently implementable.
        approvalPreset: autonomous
        workspace:
          inherit: true
        metadata:
          device: mac

    engineer_a:
      id: engineer_a
      name: Engineer A
      description: Implements subtask using Claude Code on Raspberry Pi
      agentType: claude
      singleton: true
      capabilities:
        - implementation
        - testing
        - debugging
      reportsTo: architect
      expertise:
        - implementation
        - typescript
        - testing
      threadConfig:
        enabled: true
        objective: |
          You are an engineer. Implement the assigned subtask completely,
          including tests. Commit your work to the feature branch when done.
        approvalPreset: autonomous
        workspace:
          inherit: true
        metadata:
          device: pi

    engineer_b:
      id: engineer_b
      name: Engineer B
      description: Implements subtask using Codex on Raspberry Pi
      agentType: codex
      singleton: true
      capabilities:
        - implementation
        - testing
        - debugging
      reportsTo: architect
      expertise:
        - implementation
        - python
        - documentation
      threadConfig:
        enabled: true
        objective: |
          You are an engineer. Implement the assigned subtask completely,
          including tests. Commit your work to the feature branch when done.
        approvalPreset: autonomous
        workspace:
          inherit: true
        metadata:
          device: pi

    engineer_c:
      id: engineer_c
      name: Engineer C
      description: Implements subtask using Gemini CLI on Raspberry Pi
      agentType: gemini
      singleton: true
      capabilities:
        - implementation
        - testing
        - debugging
      reportsTo: architect
      expertise:
        - implementation
        - api_design
        - integration
      threadConfig:
        enabled: true
        objective: |
          You are an engineer. Implement the assigned subtask completely,
          including tests. Commit your work to the feature branch when done.
        approvalPreset: autonomous
        workspace:
          inherit: true
        metadata:
          device: pi

  routing:
    - from: [engineer_a, engineer_b, engineer_c]
      to: architect
      messageTypes:
        - question
        - status
    - from: architect
      to: [engineer_a, engineer_b, engineer_c]
      messageTypes:
        - task
        - response

  escalation:
    defaultBehavior: route_to_reports_to
    timeoutMs: 300000
    maxDepth: 2
    onMaxDepth: surface_to_user

workflow:
  name: Swarm Build
  input:
    task:
      type: string
      description: The project to build from scratch
    repo:
      type: string
      description: Git repository URL for the workspace

  steps:
    # Step 0: Architect creates plan for subtask 1 (SimulationController)
    - type: assign
      role: architect
      task: |
        You are the architect for this project. Analyze the codebase and create
        a focused, specific implementation plan for SUBTASK 1 ONLY.

        Project: ${input.task}
        Repository: ${input.repo}

        Create the implementation plan for: SimulationController — a game engine
        component with angel attack phases (Detection, Approach, Contact, Resolution),
        timers, automatic state changes, and win/lose conditions with start/pause/reset.

        Output ONLY the specific instructions for this one subtask. Include:
        - Exact files to create/modify
        - Key interfaces and types
        - Implementation details
        - How it integrates with useNervStore

    # Step 1: Architect creates plan for subtask 2 (PilotPanel)
    - type: assign
      role: architect
      task: |
        Create a focused implementation plan for SUBTASK 2 ONLY.

        Project: ${input.task}

        Create the implementation plan for: PilotPanel — dynamic pilot management
        UI with add/remove pilots, status toggles (ACTIVE/INACTIVE/BERSERK),
        sync ratio sliders, EVA unit assignment. Terminal commands: pilot --list,
        pilot --assign.

        Output ONLY the specific instructions for this one subtask. Include:
        - Exact files to create/modify
        - Key interfaces and types
        - Implementation details
        - How it integrates with useNervStore

    # Step 2: Architect creates plan for subtask 3 (AlertLog + Telemetry)
    - type: assign
      role: architect
      task: |
        Create a focused implementation plan for SUBTASK 3 ONLY.

        Project: ${input.task}

        Create the implementation plan for: AlertLog with real-time telemetry —
        scrollable timestamped alert feed with severity filtering
        (INFO/WARNING/CRITICAL/EMERGENCY), acknowledgment, plus simulated
        telemetry stream driving sync ratio fluctuations and MAGI re-votes.

        Output ONLY the specific instructions for this one subtask. Include:
        - Exact files to create/modify
        - Key interfaces and types
        - Implementation details
        - How it integrates with useNervStore

    # Step 3: All 3 engineers start in parallel with their specific plans
    - type: parallel
      steps:
        - type: assign
          role: engineer_a
          task: |
            Implement the following subtask. Create all required files, write tests,
            and commit your work. When done, push your branch and create a PR.

            ${step_0_result}

        - type: assign
          role: engineer_b
          task: |
            Implement the following subtask. Create all required files, write tests,
            and commit your work. When done, push your branch and create a PR.

            ${step_1_result}

        - type: assign
          role: engineer_c
          task: |
            Implement the following subtask. Create all required files, write tests,
            and commit your work. When done, push your branch and create a PR.

            ${step_2_result}

    # Step 4: Architect reviews all engineer output
    - type: review
      reviewer: architect
      subject: ${step_5_result}

    # Step 7: Aggregate final results
    - type: aggregate
      method: merge

  output: step_3_result

metadata:
  category: demo
  complexity: high
  demo: coding-swarm
  hardware:
    - type: mac
      role: architect
    - type: raspberry_pi
      role: engineer
      count: 3
      display: waveshare_5inch
