{{- if .Values.controlPlane.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "parallax.fullname" . }}-control-plane
  labels:
    {{- include "parallax.controlPlane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controlPlane.replicaCount }}
  selector:
    matchLabels:
      {{- include "parallax.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/control-plane-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "parallax.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "parallax.fullname" . }}-control-plane
      securityContext:
        {{- toYaml .Values.security.podSecurityContext | nindent 8 }}
      initContainers:
        {{- if .Values.controlPlane.cloudSqlProxy.enabled }}
        # Native sidecar: starts before other init containers, stays running for pod lifetime
        - name: cloud-sql-proxy
          image: "{{ .Values.controlPlane.cloudSqlProxy.image | default "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.8.0" }}"
          args:
            - "--structured-logs"
            - "--port=5432"
            - "--health-check"
            - "--http-port=9090"
            - "{{ .Values.controlPlane.cloudSqlProxy.connectionName }}"
          restartPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
          resources:
            requests:
              memory: 64Mi
              cpu: 20m
            limits:
              memory: 512Mi
              cpu: 200m
          startupProbe:
            httpGet:
              path: /startup
              port: 9090
            periodSeconds: 1
            failureThreshold: 60
        {{- end }}
        - name: migrate
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            {{- if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "parallax.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}?schema=public"
            {{- end }}
            {{- if .Values.controlPlane.existingSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.existingSecret }}
                  key: DATABASE_URL
            {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      containers:
        - name: control-plane
          securityContext:
            {{- toYaml .Values.security.containerSecurityContext | nindent 12 }}
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.controlPlane.service.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.controlPlane.service.metricsPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.controlPlane.service.grpcPort | default 8081 }}
              protocol: TCP
          env:
            - name: PORT
              value: "{{ .Values.controlPlane.service.port }}"
            - name: METRICS_PORT
              value: "{{ .Values.controlPlane.service.metricsPort }}"
            - name: GRPC_PORT
              value: "{{ .Values.controlPlane.service.grpcPort | default 8081 }}"
            - name: NODE_ENV
              value: "{{ .Values.controlPlane.env.NODE_ENV | default "production" }}"
            - name: PARALLAX_ETCD_ENDPOINTS
              value: "{{ include "parallax.fullname" . }}-etcd:2379"
            {{- if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "parallax.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}?schema=public"
            {{- end }}
            {{- if .Values.influxdb.enabled }}
            - name: PARALLAX_CONFIDENCE_STORE
              value: "influxdb"
            - name: INFLUXDB_URL
              value: "http://{{ include "parallax.fullname" . }}-influxdb:8086"
            - name: INFLUXDB_TOKEN
              value: "{{ .Values.influxdb.auth.admin.token }}"
            - name: INFLUXDB_ORG
              value: "{{ .Values.influxdb.auth.org }}"
            - name: INFLUXDB_BUCKET
              value: "{{ .Values.influxdb.auth.bucket }}"
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: PARALLAX_HA_ENABLED
              value: "true"
            - name: PARALLAX_REDIS_URL
              value: "redis://{{ include "parallax.fullname" . }}-redis:6379"
            {{- end }}
            {{- if .Values.controlPlane.licenseKey }}
            - name: PARALLAX_LICENSE_KEY
              value: {{ .Values.controlPlane.licenseKey | quote }}
            {{- end }}
            {{- if .Values.controlPlane.existingSecret }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.existingSecret }}
                  key: JWT_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.existingSecret }}
                  key: DATABASE_URL
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.controlPlane.existingSecret }}
                  key: DATABASE_PASSWORD
                  optional: true
            {{- end }}
            {{- range $key, $value := .Values.controlPlane.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
          volumeMounts:
            - name: patterns
              mountPath: /patterns
              readOnly: true
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: patterns
          configMap:
            name: {{ .Values.controlPlane.patterns.configMap }}
        - name: config
          configMap:
            name: {{ include "parallax.fullname" . }}-control-plane
        - name: tmp
          emptyDir: {}
      {{- with .Values.controlPlane.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlPlane.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlPlane.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
