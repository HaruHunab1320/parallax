{{- /*
Always render this configmap: the control-plane deployment mounts it
unconditionally at /patterns. Rendering it only when defaultPatterns is
set caused helm to delete it on upgrade, leaving new pods stuck in
Init with an unmountable volume.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.controlPlane.patterns.configMap | default (printf "%s-patterns" (include "parallax.fullname" .)) }}
  namespace: {{ include "parallax.namespace" . }}
  labels:
    {{- include "parallax.labels" . | nindent 4 }}
    app.kubernetes.io/component: patterns
data:
  {{- range $name, $content := .Values.controlPlane.patterns.defaultPatterns }}
  {{ $name }}: |
{{ $content | indent 4 }}
  {{- end }}
