---
# Namespace for spawned agent pods
apiVersion: v1
kind: Namespace
metadata:
  name: parallax-agents
  labels:
    app.kubernetes.io/part-of: parallax
    app.kubernetes.io/managed-by: parallax-runtime-k8s

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parallax-runtime-k8s
  namespace: parallax
  labels:
    app.kubernetes.io/name: parallax-runtime-k8s
    app.kubernetes.io/component: runtime
    app.kubernetes.io/part-of: parallax
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: parallax-runtime-k8s
  template:
    metadata:
      labels:
        app.kubernetes.io/name: parallax-runtime-k8s
        app.kubernetes.io/component: runtime
        app.kubernetes.io/part-of: parallax
    spec:
      serviceAccountName: parallax-runtime-k8s
      containers:
        - name: runtime-k8s
          image: gcr.io/parallax-466513/parallax-runtime-k8s:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9878
              protocol: TCP
          env:
            - name: RUNTIME_PORT
              value: "9878"
            - name: RUNTIME_HOST
              value: "0.0.0.0"
            - name: PARALLAX_NAMESPACE
              value: "parallax-agents"
            - name: IMAGE_PREFIX
              value: "gcr.io/parallax-466513/"
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: parallax-runtime-k8s
  namespace: parallax
  labels:
    app.kubernetes.io/name: parallax-runtime-k8s
    app.kubernetes.io/component: runtime
    app.kubernetes.io/part-of: parallax
spec:
  type: ClusterIP
  ports:
    - port: 9878
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: parallax-runtime-k8s
